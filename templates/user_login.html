<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Duel Masters Card Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-box {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.12);
            padding: 36px 40px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            margin: 0 0 24px;
            font-size: 1.5em;
            color: #1a1a1a;
        }

        .flash-messages {
            margin-bottom: 16px;
        }

        .flash-msg {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 0.9em;
            color: #856404;
            margin-bottom: 6px;
        }

        label {
            display: block;
            font-size: 0.88em;
            font-weight: bold;
            color: #444;
            margin-bottom: 4px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 0.95em;
            box-sizing: border-box;
            margin-bottom: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: #2b6cff;
        }

        .btn-primary {
            width: 100%;
            padding: 11px;
            background: #2b6cff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover { background: #1a55d0; }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 18px 0;
            color: #aaa;
            font-size: 0.85em;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #ddd;
        }

        .btn-google {
            width: 100%;
            padding: 11px;
            background: #fff;
            color: #444;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            transition: background 0.2s, border-color 0.2s;
        }

        .btn-google:hover {
            background: #f5f5f5;
            border-color: #999;
        }

        .google-icon {
            width: 18px;
            height: 18px;
        }

        .footer-links {
            text-align: center;
            margin-top: 20px;
            font-size: 0.88em;
            color: #666;
        }

        .footer-links a {
            color: #2b6cff;
            text-decoration: none;
        }

        .footer-links a:hover { text-decoration: underline; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-size: 0.85em;
            color: #888;
            text-decoration: none;
        }

        .back-link:hover { color: #555; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>Login</h2>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash-messages">
            {% for message in messages %}
                <div class="flash-msg">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('user_login') }}">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required
               value="{{ request.form.get('email', '') }}"
               placeholder="example@email.com">

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required
               placeholder="Your password">

        <button type="submit" class="btn-primary">Login</button>
    </form>

    <div class="divider">or</div>

    <a href="{{ url_for('google_login') }}" class="btn-google">
        <svg class="google-icon" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.1 0 5.9 1.1 8.1 2.9l6-6C34.5 3.1 29.5 1 24 1 14.6 1 6.6 6.7 2.9 14.7l7 5.4C11.8 13.6 17.4 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.7c4.3-4 6.7-9.9 6.7-16.9z"/>
            <path fill="#FBBC05" d="M9.9 28.6A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.7-4.7l-7-5.4A23.9 23.9 0 0 0 0 24c0 3.8.9 7.4 2.5 10.6l7.4-6z"/>
            <path fill="#34A853" d="M24 47c5.4 0 9.9-1.8 13.2-4.9l-7.4-5.7c-1.8 1.2-4.1 1.9-5.8 1.9-6.5 0-12-4.1-14-9.8l-7.4 6C6.6 41.3 14.6 47 24 47z"/>
        </svg>
        Sign in with Google
    </a>

    <div class="footer-links">
        Don't have an account?
        <a href="{{ url_for('user_signup') }}">Sign up</a>
    </div>
</div>

<a href="{{ url_for('index') }}" class="back-link">← Back to card search</a>
</body>
</html>
