<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Duel Masters Card Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .signup-box {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.12);
            padding: 36px 40px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            margin: 0 0 24px;
            font-size: 1.5em;
            color: #1a1a1a;
        }

        .flash-messages { margin-bottom: 16px; }

        .flash-msg {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 0.9em;
            color: #856404;
            margin-bottom: 6px;
        }

        label {
            display: block;
            font-size: 0.88em;
            font-weight: bold;
            color: #444;
            margin-bottom: 4px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 0.95em;
            box-sizing: border-box;
            margin-bottom: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: #2b6cff;
        }

        .hint {
            font-size: 0.78em;
            color: #888;
            margin-top: -10px;
            margin-bottom: 14px;
        }

        .btn-primary {
            width: 100%;
            padding: 11px;
            background: #2b6cff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover { background: #1a55d0; }

        .footer-links {
            text-align: center;
            margin-top: 20px;
            font-size: 0.88em;
            color: #666;
        }

        .footer-links a {
            color: #2b6cff;
            text-decoration: none;
        }

        .footer-links a:hover { text-decoration: underline; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-size: 0.85em;
            color: #888;
            text-decoration: none;
        }

        .back-link:hover { color: #555; }
    </style>
</head>
<body>
<div class="signup-box">
    <h2>Create Account</h2>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash-messages">
            {% for message in messages %}
                <div class="flash-msg">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('user_signup') }}">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required
               value="{{ request.form.get('email', '') }}"
               placeholder="example@email.com">

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required
               placeholder="Password (at least 6 characters)">
        <p class="hint">Must be at least 6 characters</p>

        <label for="password2">Confirm password</label>
        <input type="password" id="password2" name="password2" required
               placeholder="Re-enter your password">

        <button type="submit" class="btn-primary">Create Account</button>
    </form>

    <div class="footer-links">
        Already have an account?
        <a href="{{ url_for('user_login') }}">Login</a>
    </div>
</div>

<a href="{{ url_for('index') }}" class="back-link">← Back to card search</a>
</body>
</html>
