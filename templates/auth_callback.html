<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating... - Duel Masters Card Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .msg {
            text-align: center;
            color: #444;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #ddd;
            border-top-color: #2b6cff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        a { color: #2b6cff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="msg">
    <div class="spinner"></div>
    <p>Authenticating, please wait...</p>
</div>

<script>
    (function () {
        var hash = window.location.hash.substring(1);
        var params = new URLSearchParams(hash);
        var accessToken = params.get('access_token');
        var errorDesc = params.get('error_description') || params.get('error');

        if (errorDesc) {
            document.querySelector('.msg').innerHTML =
                '<p style="color:red;">Authentication error: ' + errorDesc + '</p>' +
                '<a href="/user/login">Back to login</a>';
            return;
        }

        if (accessToken) {
            fetch('/auth/set-session', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ access_token: accessToken })
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.ok) {
                    window.location.href = '/';
                } else {
                    document.querySelector('.msg').innerHTML =
                        '<p style="color:red;">Failed to establish session.</p>' +
                        '<a href="/user/login">Back to login</a>';
                }
            })
            .catch(function() {
                document.querySelector('.msg').innerHTML =
                    '<p style="color:red;">A network error occurred.</p>' +
                    '<a href="/user/login">Back to login</a>';
            });
        } else {
            document.querySelector('.msg').innerHTML =
                '<p>No authentication token found.</p>' +
                '<a href="/user/login">Back to login</a>';
        }
    })();
</script>
</body>
</html>
